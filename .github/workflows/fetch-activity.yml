name: Fetch GitHub activity

on:
  schedule:
    # Every Monday 00:15 UTC
    - cron: "15 0 * * 1"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        run: |
          if [ -f pnpm-lock.yaml ]; then
            npm i -g pnpm && pnpm install --frozen-lockfile
          elif [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Fetch activity
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          if [ -f pnpm-lock.yaml ]; then
            pnpm fetch-activity
          else
            npm run fetch-activity
          fi

      - name: Commit updated data/activity.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/activity.json
          if git diff --cached --quiet; then
            echo "No activity changes."
          else
            git commit -m "chore(activity): weekly refresh"
            git push
          fi
